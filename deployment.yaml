apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-audit-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-audit-tool
  template:
    metadata:
      labels:
        app: cloud-audit-tool
    spec:
      containers:
        - name: cloud-audit-tool
          image: 206204552347.dkr.ecr.ap-south-1.amazonaws.com/cloud-audit-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AWS_DEFAULT_REGION
              value: ap-south-1
            - name: AWS_REGION
              value: ap-south-1
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-audit-tool-service
spec:
  selector:
    app: cloud-audit-tool
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer